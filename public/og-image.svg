<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0E0E0E"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grain)" opacity="0.04"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.04"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.04"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.04"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="52" height="52" fill="#22C55E"/>
  <text x="106" y="119" font-family="Georgia, serif" font-size="32" fill="white" text-anchor="middle">S</text>

  <!-- Site name -->
  <text x="148" y="118" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="500" fill="white">StartItUp.in</text>

  <!-- Main headline -->
  <text x="80" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="white">Every startup</text>
  <text x="80" y="400" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="white">opportunity</text>
  <text x="80" y="490" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-style="italic" fill="#22C55E">in India.</text>

  <!-- Tagline -->
  <text x="80" y="572" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="rgba(255,255,255,0.45)">Credits · Grants · Accelerators · Incubators · Investors</text>

  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </defs>
</svg>
